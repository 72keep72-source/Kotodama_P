<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>広告ページ - 言霊のプロトコル</title>
    <style>
        body { background-color: #1a1a1a; color: #f0f0f0; font-family: sans-serif; line-height: 1.8; max-width: 800px; margin: 40px auto; padding: 20px; }
        a { color: #4CAF50; }
        
        #imobile-adpage-container {
            margin: 30px 0;
            min-height: 100px;
        }

        #back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            opacity: 0.5;
            pointer-events: none;
        }

        #back-button.enabled {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <h1>広告ページです。</h1>
    <p>
        しばらく広告をご覧ください。<br>
        視聴後、ゲームに戻ると報酬を受け取れます。
    </p>

    <p id="status-text">広告を読み込み中...</p>


    <div id="imobile-adpage-container"></div>

    <a id="back-button" href="index.html">ゲームに戻る</a>

    <script src="./ad-reward.js"></script>
</body>
</html>
